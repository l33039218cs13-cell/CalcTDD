name: Run Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Install coverage
        run: pip install coverage

      - name: Run tests with coverage
        run: coverage run CalcTest.py

      - name: Show coverage report
        run: coverage report